<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luân Store</title>
    <!-- Thêm thư viện Icon FontAwesome để hiện logo FB, TikTok, Zalo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Dán trực tiếp CSS vào đây để không bao giờ bị lỗi đường dẫn nữa -->
    <style>
        /* Khởi tạo cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Khung màn hình điện thoại */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: #f5f6f8;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Thanh điều hướng Header */
        .store-header {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #f0f0f0;
        }

        .store-header .store-name {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
        }

        .back-btn {
            font-size: 18px;
            cursor: pointer;
            color: #333333;
            font-weight: bold;
        }

        .menu-btn {
            font-size: 14px;
            cursor: pointer;
            color: #000000;
            letter-spacing: -1px;
        }

        /* Banner Xanh Gradient */
        .store-banner {
            background: linear-gradient(180deg, #1e90ff 0%, #00bfff 100%);
            padding: 45px 20px;
            text-align: center;
            color: #ffffff;
        }

        .store-banner h2 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .store-banner p {
            font-size: 14px;
            opacity: 0.95;
            line-height: 1.4;
        }

        /* Vùng chứa sản phẩm */
        .product-list {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            flex: 1;
        }

        /* Thẻ Sản Phẩm Trắng */
        .product-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .product-card h3 {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 15px;
        }

        .product-card .price {
            font-size: 22px;
            font-weight: bold;
            color: #ff3b30;
            margin-bottom: 20px;
        }

        /* Nút Mua ngay màu xanh dương */
        .buy-btn {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 10px 28px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .buy-btn:hover {
            background-color: #0056b3;
        }

        /* Khu vực liên kết mạng xã hội dưới chân trang */
        .social-contact {
            background-color: #ffffff;
            padding: 20px 15px;
            text-align: center;
            border-top: 1px solid #ededed;
        }

        .social-contact p {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .social-item:active {
            transform: scale(0.95);
        }

        .social-item.facebook {
            background-color: #1877f2;
        }

        .social-item.tiktok {
            background-color: #010101;
        }

        .social-item.zalo {
            background-color: #0068ff;
        }

        .zalo-icon {
            font-weight: 900;
            font-size: 13px;
            background-color: #ffffff;
            color: #0068ff;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Thanh điều hướng trên cùng -->
        <header class="store-header">
            <span class="back-btn">&#10094;</span>
            <h1 class="store-name">Luân Store</h1>
            <span class="menu-btn">&#8226;&#8226;&#8226;</span>
        </header>

        <!-- Banner màu xanh chuyển sắc (Gradient) -->
        <section class="store-banner">
            <h2>Chào mừng đến với Luân Store</h2>
            <p>Chuyên bán Key Game, Gift Card và Game Pass chính hãng.</p>
        </section>

        <!-- Danh sách thẻ sản phẩm -->
        <section class="product-list">
            
            <!-- Sản phẩm 1 -->
            <div class="product-card">
                <h3>Steam Gift Card 100K</h3>
                <p class="price">100.000đ</p>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Sản phẩm 2 -->
            <div class="product-card">
                <h3>Xbox Game Pass</h3>
                <p class="price">150.000đ</p>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Sản phẩm 3 -->
            <div class="product-card">
                <h3>Steam Wallet 500K</h3>
                <p class="price">500.000đ</p>
                <button class="buy-btn">Mua ngay</button>
            </div>

        </section>

        <!-- Phần liên hệ mạng xã hội (Facebook, TikTok, Zalo) -->
        <footer class="social-contact">
            <p>Kết nối với chúng tôi qua:</p>
            <div class="social-links">
                <a href="https://facebook.com/" target="_blank" class="social-item facebook">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://tiktok.com/" target="_blank" class="social-item tiktok">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://zalo.me/" target="_blank" class="social-item zalo">
                    <span class="zalo-icon">Z</span>
                    <span>Zalo</span>
                </a>
            </div>
        </footer>
    </div>

</body>
</html>
