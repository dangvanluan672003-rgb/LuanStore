<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dành Riêng Cho Em ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Nền -->
<div id="stars"></div>
<div id="hearts"></div>
<div id="flowers"></div>

<!-- Nhạc -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Màn hình mở đầu -->
<section class="welcome">

<h1>
Có một món quà dành riêng cho em ❤️
</h1>

<p>
Nếu em đã sẵn sàng...
<br>
hãy nhấn nút bên dưới nhé.
</p>

<button id="openBtn">
🎁 MỞ MÓN QUÀ
</button>

</section>

<!-- Lá thư -->
<section class="letter hide" id="letter">

<div class="glass">

<h2>
💌 Gửi người anh thương
</h2>

<p id="typing"></p>

<div class="buttons">

<button id="yes">
💖 Đồng ý
</button>

<button id="no">
🙈 Không
</button>

</div>

</div>

</section>

<!-- Khi đồng ý -->
<div id="success" class="hide">

<h1>
❤️ Cảm ơn em ❤️
</h1>

<h2>
Từ hôm nay...
<br>
Anh sẽ là người làm em cười mỗi ngày.
</h2>

</div>

<script src="script.js"></script>

</body>
</html>
